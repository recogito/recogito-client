<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Account Invitation</title>
  </head>
  <body style="background-color: #b5c8dc; margin: 0; padding: 0; font-family: sans-serif; color: #242424; -webkit-font-smoothing: antialiased;">
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #b5c8dc; padding: 24px;">
      <tr>
        <td align="center">
          <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; padding: 24px;">
            <tr>
              <td align="center" style="padding-bottom: 16px;">
                <img src="{{ .SiteURL }}/img/branding/email/top-logo.png" alt="Cove Studio" width="300" style="display: block; margin: 0 auto; outline: none; border: none; text-decoration: none;" />
              </td>
            </tr>
            <tr>
              <td>
                <p style="font-size: 16px; line-height: 1.5; margin: 0 0 16px 0;">
                  Greetings!
                </p>
                <p style="font-size: 16px; line-height: 1.5; margin: 0 0 16px 0;">
                  You have been invited to join other users on {{ .SiteURL }}.
                  Use the button below to accept the invitation and set your credentials.
                  We look forward to seeing you there!
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom: 16px;">
                <a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/en/reset-password" style="background-color: #07529a; color: #ffffff; font-size: 14px; padding: 16px 24px; text-decoration: none; border-radius: 4px; display: inline-block; font-weight: normal;">
                  Accept Invite
                </a>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
